services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: vidres-valls-web:latest
    container_name: vidres-valls-web
    restart: unless-stopped
    expose:
      - "3000"
    # NO mapeamos puertos al host. nginx del host hace proxy_pass a 127.0.0.1:3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/ca"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Logs con rotación (mismo patrón que tus otros contenedores)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
