# === vhost para vidres-valls-web (puerto 14443) ===
# Pega este bloque al final de /etc/nginx/sites-enabled/reverse-proxy.conf
# y luego: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 14443 ssl;
    listen [::]:14443 ssl;
    http2 on;

    server_name srv1744329 srv1744329.tail8b28a8.ts.net _;

    # Cert autofirmado multi-SAN (mismo que las otras apps)
    ssl_certificate     /root/cristalapp-secrets/ssl/selfsigned.crt;
    ssl_certificate_key /root/cristalapp-secrets/ssl/selfsigned.key;
    ssl_dhparam         /root/cristalapp-secrets/ssl/dhparam.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Buffers
    client_max_body_size 25M;
    proxy_buffer_size 16k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;

    # HSTS + security headers (mismo patrón que las otras apps)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # Logs
    access_log /var/log/nginx/vidres-valls-web.access.log;
    error_log  /var/log/nginx/vidres-valls-web.error.log;

    # Proxy a la web Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
